// =============================================
// Helpers
// =============================================
function computeTotals(data) {
  let total = 0;
  const categoryTotals = {};
  for (const [cat, catData] of Object.entries(data)) {
    let catTotal = 0;
    for (const subData of Object.values(catData.subcategories)) {
      for (const topicData of Object.values(subData.topics)) {
        catTotal += topicData.count;
      }
    }
    categoryTotals[cat] = catTotal;
    total += catTotal;
  }
  return { total, categoryTotals };
}

function getMaxTopicCount(data) {
  let max = 0;
  for (const catData of Object.values(data)) {
    for (const subData of Object.values(catData.subcategories)) {
      for (const topicData of Object.values(subData.topics)) {
        if (topicData.count > max) max = topicData.count;
      }
    }
  }
  return max;
}

function FreqBar({ count, maxCount, color }) {
  const pct = Math.round((count / maxCount) * 100);
  return (
    <div className="freq-bar">
      <div className="freq-track">
        <div className="freq-fill" style={{ width: pct + '%', background: color }} />
      </div>
      <span className="freq-num" style={{ color }}>{count}</span>
    </div>
  );
}

    </div>
  );
}

function StatsBar({ data }) {
  const { total, categoryTotals } = computeTotals(data);
  const sorted = Object.entries(categoryTotals).sort((a, b) => b[1] - a[1]);
  return (
    <div className="stats-grid">
      <div className="stat-card total">
        <div className="stat-label">题目总数</div>
        <div className="stat-number">{total}</div>
        <div className="stat-sub">{Object.keys(data).length} 大类</div>
      </div>
      {sorted.map(([name, count]) => {
        const cat = data[name];
        return (
          <div key={name} className="stat-card cat" style={{ borderLeft: `4px solid ${cat.color}` }}>
            <div className="stat-label" style={{ color: '#64748b' }}>{cat.icon} {name.split(' ')[0]}</div>
            <div className="stat-number" style={{ color: cat.color }}>{count}</div>
            <div className="stat-sub" style={{ color: '#94a3b8', opacity: 1 }}>{Math.round(count / total * 100)}% 占比</div>
          </div>
        );
      })}
    </div>
  );
}

function TreeBrowser({ data }) {
  const [expCats, setExpCats] = useState({});
  const [expSubs, setExpSubs] = useState({});
  const [expTopics, setExpTopics] = useState({});
  const [expMethods, setExpMethods] = useState({});
  const { total } = computeTotals(data);
  const maxCount = getMaxTopicCount(data);

  const toggle = (setter, key) => setter(p => ({ ...p, [key]: !p[key] }));

  return (
    <div>
      <div className="browse-hint"><span>📂</span><span>题型分类浏览 — 点击展开各层级</span></div>

      {Object.entries(data).map(([catName, catData]) => {
        const isExp = expCats[catName];
        let catCount = 0;
        for (const sub of Object.values(catData.subcategories))
          for (const t of Object.values(sub.topics)) catCount += t.count;
        const subCount = Object.keys(catData.subcategories).length;

        return (
          <div key={catName}>
            {/* Level 1 */}
            <div className={`cat-row ${isExp ? 'expanded' : ''}`}
              style={isExp ? { background: catData.color, boxShadow: `0 4px 20px ${catData.color}40` } : {}}
              onClick={() => toggle(setExpCats, catName)}>
              <div className="cat-left">
                <span className="cat-icon" style={{
                  background: isExp ? 'rgba(255,255,255,0.2)' : catData.color + '15'
                }}>{catData.icon}</span>
                <div>
                  <div className="cat-name">{catName}</div>
                  <div className="cat-meta">{subCount} 个子分类 · {catCount} 题 · 占比 {Math.round(catCount / total * 100)}%</div>
                </div>
              </div>
              <div className="cat-right">
                <span className="cat-count" style={{ opacity: isExp ? 1 : 0.6 }}>{catCount}</span>
                <span className={`arrow ${isExp ? 'open' : ''}`}>›</span>
              </div>
            </div>

            {/* Level 2 */}
            {isExp && (
              <div className="sub-container">
                {Object.entries(catData.subcategories).map(([subName, subData]) => {
                  const subKey = catName + '>' + subName;
                  const subExp = expSubs[subKey];
                  let subTotal = 0;
                  for (const t of Object.values(subData.topics)) subTotal += t.count;

                  return (
                    <div key={subKey}>
                      <div className={`sub-row ${subExp ? 'expanded' : ''}`}
                        style={subExp ? { borderColor: catData.color + '30' } : {}}
                        onClick={() => toggle(setExpSubs, subKey)}>
                        <div className="sub-left">
                          <span className="sub-dot" style={{ background: catData.color }} />
                          <div>
                            <div className="sub-name">{subName}</div>
                            <div className="sub-meta">{Object.keys(subData.topics).length} 个知识点</div>
                          </div>
                        </div>
                        <div className="sub-right">
                          <FreqBar count={subTotal} maxCount={maxCount * 2} color={catData.color} />
                          <span className={`arrow ${subExp ? 'open' : ''}`} style={{ color: '#94a3b8', fontSize: 16 }}>›</span>
                        </div>
                      </div>

                      {/* Level 3 */}
                      {subExp && (
                        <div className="topic-container">
                          {Object.entries(subData.topics).map(([topicName, topicData]) => {
                            const topicKey = subKey + '>' + topicName;
                            const topicExp = expTopics[topicKey];
                            return (
                              <div key={topicKey}>
                                <div className={`topic-row`}
                                  style={topicExp ? { background: catData.color + '08' } : {}}
                                  onClick={() => toggle(setExpTopics, topicKey)}>
                                  <div className="topic-left">
                                    <span className="topic-diamond" style={{ color: catData.color }}>◆</span>
                                    <span className="topic-name">{topicName}</span>
                                  </div>
                                  <div className="topic-right">
                                    <FreqBar count={topicData.count} maxCount={maxCount} color={catData.color} />
                                    <span className={`arrow ${topicExp ? 'open' : ''}`} style={{ color: '#cbd5e1', fontSize: 14 }}>›</span>
                                  </div>
                                </div>

                                {/* Level 4: Methods + Questions */}
                                {topicExp && (
                                  <div className="method-container">
                                    <div className="method-label">解题方法：</div>
                                    {topicData.methods.map(m => {
                                      const mKey = topicKey + '>' + m;
                                      const mExp = expMethods[mKey];
                                      const mQuestions = topicData.questions.filter(q => q.method === m);
                                      return (
                                        <div key={m} className="method-wrapper">
                                          <span className="method-tag"
                                            style={{
                                              background: mExp ? catData.color : catData.color + '12',
                                              color: mExp ? 'white' : catData.color,
                                              borderColor: catData.color + '25',
                                            }}
                                            onClick={(e) => { e.stopPropagation(); toggle(setExpMethods, mKey); }}>
                                            <span>{m}</span>
                                            {mQuestions.length > 0 && (
                                              <span className="badge" style={{
                                                background: mExp ? 'rgba(255,255,255,0.3)' : catData.color + '20'
                                              }}>{mQuestions.length}</span>
                                            )}
                                          </span>
                                          {mExp && mQuestions.length > 0 && (
                                            <div style={{ marginTop: 4, marginBottom: 8 }}>
                                              {mQuestions.map(q => <QuestionCard key={q.id} q={q} color={catData.color} />)}
                                            </div>
                                          )}
                                        </div>
                                      );
                                    })}

                                    {topicData.questions.length > 0 && (
                                      <div style={{ marginTop: 8 }}>
                                        <div className="method-label">📝 题目示例 ({topicData.questions.length} / {topicData.count})：</div>
                                        {topicData.questions.map(q => <QuestionCard key={q.id} q={q} color={catData.color} />)}
                                      </div>
                                    )}

                                    {topicData.questions.length === 0 && (
                                      <div className="empty-placeholder">暂无题目示例 — 上传试卷后自动填充</div>
                                    )}
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function FrequencyRanking({ data }) {
  const allTopics = [];
  for (const [catName, catData] of Object.entries(data)) {
    for (const [subName, subData] of Object.entries(catData.subcategories)) {
      for (const [topicName, topicData] of Object.entries(subData.topics)) {
        allTopics.push({
          name: topicName, sub: subName.split(' ')[0], cat: catName.split(' ')[0],
          count: topicData.count, color: catData.color, icon: catData.icon,
        });
      }
    }
  }
  allTopics.sort((a, b) => b.count - a.count);
  const top10 = allTopics.slice(0, 10);
  const maxC = top10[0]?.count || 1;

  return (
    <div className="panel">
      <div className="rank-title">🔥 高频题型 TOP 10</div>
      {top10.map((t, i) => (
        <div key={i} className="rank-row">
          <span className="rank-badge" style={{
            background: i < 3 ? t.color : '#f1f5f9',
            color: i < 3 ? 'white' : '#94a3b8',
          }}>{i + 1}</span>
          <div className="rank-info">
            <div className="rank-name">{t.name}</div>
            <div className="rank-path">{t.cat} › {t.sub}</div>
          </div>
          <div className="rank-bar-area">
            <div className="rank-track">
              <div className="rank-fill" style={{ width: `${(t.count / maxC) * 100}%`, background: t.color }} />
            </div>
            <span className="rank-count" style={{ color: t.color }}>{t.count}</span>
          </div>
        </div>
      ))}
    </div>
  );
}

function UploadZone({ onUploadComplete }) {
  const [dragOver, setDragOver] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [progress, setProgress] = useState(0);
  const [stage, setStage] = useState("");
  const fileInputRef = useRef(null);

  const simulateProcessing = useCallback(() => {
    setUploading(true); setProgress(0);
    const stages = [
      { p: 15, text: "📸 正在读取图片..." },
      { p: 35, text: "🔍 OCR 文字识别中..." },
      { p: 55, text: "✂️ 正在拆分题目..." },
      { p: 75, text: "🧠 AI 题型分类中..." },
      { p: 90, text: "📊 更新统计数据..." },
      { p: 100, text: "✅ 处理完成！" },
    ];
    let i = 0;
    const interval = setInterval(() => {
      if (i < stages.length) {
        setProgress(stages[i].p); setStage(stages[i].text); i++;
      } else {
        clearInterval(interval);
        setTimeout(() => {
          setUploading(false); setProgress(0); setStage("");
          onUploadComplete({ filename: "2024_数学中考真题.jpg", questionsFound: 8, newTypes: 2, updatedTypes: 6 });
        }, 800);
      }
    }, 700);
  }, [onUploadComplete]);

  return (
    <div className={`upload-zone ${dragOver ? 'dragover' : ''} ${uploading ? 'uploading' : ''}`}
      onDragOver={e => { e.preventDefault(); setDragOver(true); }}
      onDragLeave={() => setDragOver(false)}
      onDrop={e => { e.preventDefault(); setDragOver(false); simulateProcessing(); }}
      onClick={() => !uploading && fileInputRef.current?.click()}>
      <input ref={fileInputRef} type="file" accept="image/*,.pdf" style={{ display: 'none' }}
        onChange={() => simulateProcessing()} />
      {uploading ? (
        <div>
          <div className="upload-stage">{stage}</div>
          <div className="progress-track">
            <div className="progress-fill" style={{ width: progress + '%' }} />
          </div>
          <div className="progress-pct">{progress}%</div>
        </div>
      ) : (
        <div>
          <div className="upload-icon">📄</div>
          <div className="upload-title">拖拽试卷到这里，或点击上传</div>
          <div className="upload-hint">支持 JPG / PNG / PDF 格式</div>
        </div>
      )}
    </div>
  );
}

function Toast({ data, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 5000); return () => clearTimeout(t); }, [onClose]);
  return (
    <div className="toast">
      <div className="toast-header">
        <div>
          <div className="toast-title">✅ 处理完成</div>
          <div className="toast-body">
            <strong>{data.filename}</strong><br />
            识别 {data.questionsFound} 道题目<br />
            新增 {data.newTypes} 个题型 · 更新 {data.updatedTypes} 个题型
          </div>
        </div>
        <button className="toast-close" onClick={onClose}>×</button>
      </div>
    </div>
  );
}

// =============================================
// Main App
// =============================================
function App() {
  const [tab, setTab] = useState("browse");
  const [toast, setToast] = useState(null);
  const handleUpload = useCallback((result) => setToast(result), []);

  return (
    <div>
      {/* Header */}
      <div className="header">
        <div className="header-inner">
          <div className="logo-area">
            <div className="logo-icon">Q</div>
            <div>
              <div className="logo-title">题型频率引擎</div>
              <div className="logo-sub">QUESTION TYPE FREQUENCY ENGINE</div>
            </div>
          </div>
          <div className="tabs">
            <button className={`tab-btn ${tab === 'browse' ? 'active' : ''}`} onClick={() => setTab('browse')}>📂 分类浏览</button>
            <button className={`tab-btn ${tab === 'upload' ? 'active' : ''}`} onClick={() => setTab('upload')}>📤 上传试卷</button>
            <button className={`tab-btn ${tab === 'ranking' ? 'active' : ''}`} onClick={() => setTab('ranking')}>🔥 频率排行</button>
          </div>
        </div>
      </div>

      {/* Content */}
      <div className="content">
        <StatsBar data={QUESTION_DATABASE} />

        {tab === "browse" && (
          <div className="panel">
            <TreeBrowser data={QUESTION_DATABASE} />
          </div>
        )}

        {tab === "upload" && (
          <div>
            <UploadZone onUploadComplete={handleUpload} />
            <div className="panel" style={{ marginTop: 20 }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: '#1e293b', marginBottom: 12 }}>🤖 AI 处理流程</div>
              <div className="ai-flow-grid">
                {[
                  { step: "1", title: "OCR 识别", desc: "图片/PDF → 文字", icon: "🔍" },
                  { step: "2", title: "拆题", desc: "整卷 → 独立题目", icon: "✂️" },
                  { step: "3", title: "大类分析", desc: "语义识别题目类型", icon: "📊" },
                  { step: "4", title: "细分归类", desc: "结合答案分小类", icon: "🧠" },
                  { step: "5", title: "方法标记", desc: "标记解题方法", icon: "🏷️" },
                  { step: "6", title: "入库统计", desc: "更新频率数据", icon: "💾" },
                ].map(s => (
                  <div key={s.step} className="ai-step">
                    <div className="ai-step-icon">{s.icon}</div>
                    <div className="ai-step-title">Step {s.step}: {s.title}</div>
                    <div className="ai-step-desc">{s.desc}</div>
                  </div>
                ))}
              </div>
            </div>

        )}

        {tab === "ranking" && <FrequencyRanking data={QUESTION_DATABASE} />}

      {toast && <Toast data={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script></body>
